name: Coverage

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone proto definitions
        run: git clone --depth 1 https://github.com/Mertcikla/tld-proto.git ../proto

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: |
          echo "### Code Coverage Summary" > coverage_report.md
          echo " " >> coverage_report.md
          echo "\`\`\`text" >> coverage_report.md
          cargo llvm-cov --all-features --workspace --summary-only >> coverage_report.md
          echo "\`\`\`" >> coverage_report.md

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coverage_report.md
