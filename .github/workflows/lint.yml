name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone proto definitions
        run: git clone --depth 1 https://github.com/Mertcikla/tld-proto.git proto-repo

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        env:
          TLD_PROTO_PATH: ${{ github.workspace }}/proto-repo
        run: cargo clippy --all-features -- -D warnings
