[package]
name = "tld"
version = "0.1.12"
edition = "2024"

[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"
incremental = true

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 16

[dependencies]
# Proto/gRPC bindings — generated by buf, path dep on the canonical proto/ repo.
# Locally: ../proto/rust must exist (clone git@github.com:Mertcikla/tld-proto.git as ../proto).
# CI: the workflow clones tld-proto to the expected relative path.
diag-proto = { path = "../proto/rust" }
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.0", features = ["derive"] }
console = "0.16.3"
dirs = "6.0.0"
glob = "0.3.3"
harsh = "0.2.2"
indicatif = "0.18.4"
lsp-types = "0.97.0"
opener = "0.8.4"
prost-types = "0.14"
prost = "0.14"
reqwest = { version = "0.12.28", default-features = false, features = ["http2", "rustls-tls"] }
serde = "1.0.228"
serde_json = "1.0.149"
serde_yaml = "0.9.34"
tabled = "0.20.0"
tokio = { version = "1.52.0", features = ["full"] }
tokio-util = { version = "0.7.18", features = ["codec"] }
tonic = "0.14.5"
tower-lsp = "0.20.0"
tree-sitter = "0.26.8"
which = "8.0.2"
yaml-edit = "0.2.1"
yaml-rust2 = "0.11.0"
ts_pack_core = { package = "tree-sitter-language-pack", version = "1.6.0" }
strsim = "0.11.1"

[dev-dependencies]
assert_cmd = "2.2.0"
predicates = "3.1.4"
strsim = "0.11.1"
tempfile = "3.27.0"

[lints.clippy]
# Enable pedantic group for comprehensive checks
pedantic = { level = "warn", priority = -1 }

# === THE GUARDRAILS (Critical for AI Agents) ===
# Panic safety - agents must handle errors, not crash
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
panic_in_result_fn = "deny"

# The "no cheating" rule
allow_attributes = "deny"

# Code hygiene - no debug leftovers
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
print_stdout = "deny"
print_stderr = "deny"

# === ASYNC SAFETY ===
await_holding_lock = "deny"       # Prevents deadlocks

# === PROCESS SAFETY ===
exit = "deny"                     # Libraries shouldn't exit

# === PEDANTIC RELAXATIONS ===
# These are too noisy for most projects
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
must_use_candidate = "allow"
module_name_repetitions = "allow"
similar_names = "allow"
too_many_lines = "allow"
